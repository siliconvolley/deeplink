<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambulance Assistance System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1c1c1c;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: rgb(50, 50, 50);
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .label {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            display: block;
            text-align: center;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .button-group button {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .button-group button:hover {
            background-color: #0056b3;
        }
        .button-group button.active {
            background-color: #28a745;
        }
        #map {
            height: 500px;
            width: 100%;
            margin-top: 30px;
            border-radius: 8px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button[type="submit"]:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ambulance Assistance System</h1>

    <!-- Form for selecting severity and emergency type -->
    <form id="ambulance-form">
        
        <!-- Emergency Severity Section -->
        <div class="form-group">
            <span class="label">Select Severity:</span>
            <div class="button-group" id="severity-buttons">
                <button type="button" class="severity-btn" data-severity="low">Low</button>
                <button type="button" class="severity-btn" data-severity="moderate">Moderate</button>
                <button type="button" class="severity-btn" data-severity="high">High</button>
            </div>
        </div>

        <!-- Emergency Type Section -->
        <div class="form-group">
            <span class="label">Select Emergency Type:</span>
            <div class="button-group" id="emergency-buttons">
                <button type="button" class="emergency-btn" data-emergency="cardiac">Cardiac Arrest</button>
                <button type="button" class="emergency-btn" data-emergency="accident">Accident</button>
                <button type="button" class="emergency-btn" data-emergency="fire">Fire Emergency</button>
                <button type="button" class="emergency-btn" data-emergency="other">Other</button>
            </div>
        </div>

        <button type="submit">Submit</button>
    </form>

    <!-- Map to display nearest hospital -->
    <div id="map"></div>
</div>

<!-- Include Leaflet and Leaflet Routing Machine JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
    var map = L.map('map').setView([51.505, -0.09], 13); // Default map view

    // Add OpenStreetMap layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
    }).addTo(map);

    let selectedSeverity = null;
    let selectedEmergencyType = null;

    // Function to highlight the selected button and set the selected severity
    document.querySelectorAll('.severity-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.severity-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedSeverity = this.getAttribute('data-severity');
        });
    });

    // Function to highlight the selected button and set the selected emergency type
    document.querySelectorAll('.emergency-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.emergency-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedEmergencyType = this.getAttribute('data-emergency');
        });
    });

    // Function to get current location and find the nearest hospital
    function getCurrentLocationAndShowMap() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function (position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Center map to current location
                map.setView([lat, lon], 13);

                // Add a marker for the current location
                L.marker([lat, lon]).addTo(map)
                    .bindPopup("You are here.")
                    .openPopup();

                // Call a function to display the nearest hospital
                findNearestHospital(lat, lon);
            });
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    }

    // Function to find and display the nearest hospital
    function findNearestHospital(lat, lon) {
        // OpenStreetMap API for finding nearby hospitals using Overpass API
        const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node[amenity=hospital](around:5000,${lat},${lon});out;`;

        fetch(overpassUrl)
            .then(response => response.json())
            .then(data => {
                if (data.elements.length > 0) {
                    let nearestHospital = null;
                    let minDistance = Infinity;

                    // Loop through each hospital and calculate distance
                    data.elements.forEach(hospital => {
                        const hospitalLat = hospital.lat;
                        const hospitalLon = hospital.lon;

                        // Calculate distance using Haversine formula
                        const distance = haversine(lat, lon, hospitalLat, hospitalLon);

                        // Check if this is the nearest hospital
                        if (distance < minDistance) {
                            minDistance = distance;
                            nearestHospital = { lat: hospitalLat, lon: hospitalLon };
                        }
                    });

                    // Add a marker for the nearest hospital
                    L.marker([nearestHospital.lat, nearestHospital.lon]).addTo(map)
                        .bindPopup("Nearest Hospital")
                        .openPopup();

                    // Call function to show the real route
                    showRoute(lat, lon, nearestHospital.lat, nearestHospital.lon);
                } else {
                    alert("No hospital found within 5km.");
                }
            })
            .catch(error => {
                console.error("Error finding hospitals:", error);
            });
    }

    // Haversine formula to calculate distance between two points
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius of the Earth in km
        const dLat = degreesToRadians(lat2 - lat1);
        const dLon = degreesToRadians(lon2 - lon1);
        const a = 
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(degreesToRadians(lat1)) * Math.cos(degreesToRadians(lat2)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; // Distance in km
    }

    // Function to convert degrees to radians
    function degreesToRadians(degrees) {
        return degrees * (Math.PI / 180);
    }

    // Function to show the real-time route using Leaflet Routing Machine
    function showRoute(lat1, lon1, lat2, lon2) {
        // Use Leaflet Routing Machine to calculate and display the route
        L.Routing.control({
            waypoints: [
                L.latLng(lat1, lon1),
                L.latLng(lat2, lon2)
            ],
            routeWhileDragging: false,
            addWaypoints: false,
            lineOptions: {
                styles: [{ color: 'blue', weight: 5 }]
            },
            draggableWaypoints: false,
            createMarker: function() { return null; }  // Hide the default markers
        })
        .on('routesfound', function(e) {
            const route = e.routes[0];
            const time = route.summary.totalTime; // in seconds
            const eta = (time / 60).toFixed(0); // ETA in minutes

            // Replace with actual hospital name
            const hospitalName = "Nearest Hospital";

            // Call the function to send info to the hospital
            sendEmergencyToHospitalAPI(hospitalName, selectedSeverity, selectedEmergencyType, eta);
        }).addTo(map);
    }

    // Function to send the emergency data to the hospital via an API
    function sendEmergencyToHospitalAPI(hospitalName, severity, emergencyType, eta) {
        const emergencyInfo = {
            hospitalName: hospitalName,
            severity: severity,
            emergencyType: emergencyType,
            eta: eta,
        };

        console.log(emergencyInfo)

        fetch('./Hospital.html', {  // Replace with the actual hospital API endpoint
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(emergencyInfo),
        })
        .then(response => response.json())
        .then(data => {
            console.log('Success:', data);
        })
        .catch((error) => {
            console.error('Error:', error);
        });
    }

    // Handle form submission
    document.getElementById("ambulance-form").addEventListener("submit", function (e) {
        e.preventDefault();
        if (selectedSeverity && selectedEmergencyType) {
            alert(`Emergency type: ${selectedEmergencyType}, Severity: ${selectedSeverity}`);
            // Get current location and show the map with the nearest hospital
            getCurrentLocationAndShowMap();
        } else {
            alert("Please select both severity and emergency type.");
        }
    });

    function displayHospitalInfo(hospitalName, severity, emergencyType, eta) {
        document.getElementById("hospital-info").style.display = "block";
        document.getElementById("hospital-name").textContent = `Hospital Name: ${hospitalName}`;
        document.getElementById("hospital-severity").textContent = `Severity: ${severity}`;
        document.getElementById("hospital-condition").textContent = `Emergency Type: ${emergencyType}`;
        document.getElementById("hospital-eta").textContent = `Estimated Time of Arrival: ${eta} minutes`;
    }

</script>

</body>
</html>
